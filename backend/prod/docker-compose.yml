services:
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - static_volume:/app/staticfiles
    depends_on:
      - backend

  backend:
    build: ..
    image: nexus-support:latest
    env_file: ../.env
    restart: unless-stopped
    command: sh -c "python manage.py collectstatic --noinput && daphne -b 0.0.0.0 -p 8000 core.asgi:application"
    volumes:
      - static_volume:/app/staticfiles
    depends_on:
      - db
      - redis
    logging:
      driver: awslogs
      options:
        awslogs-region: "ap-southeast-2"
        awslogs-group: "/resolvio/backend"
        awslogs-stream: "backend"

  db:
    image: pgvector/pgvector:pg16
    env_file: ../.env
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped

volumes:
  postgres_data:
  static_volume: